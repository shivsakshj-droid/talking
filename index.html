<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Pro | Stable Connection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .room-section {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .room-input-wrapper {
            display: flex;
            gap: 10px;
        }

        #roomIdInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-family: monospace;
        }

        #roomIdInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .button-group button {
            flex: 1;
        }

        .status-card {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #9ca3af;
            transition: all 0.3s;
        }

        .led.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.5s infinite;
        }

        .led.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .led.disconnected {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            color: #374151;
        }

        .room-badge {
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            font-weight: 600;
            color: #667eea;
        }

        .participant-count {
            font-size: 12px;
            color: #6b7280;
        }

        .voice-visualizer {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            height: 50px;
            align-items: center;
        }

        .visualizer-bar {
            width: 6px;
            height: 20px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: height 0.05s ease;
        }

        .talk-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }

        .talk-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 4px solid white;
        }

        .talk-button.talking {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        .talk-button.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mic-icon {
            font-size: 64px;
            margin-bottom: 8px;
        }

        .talk-label {
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .talk-status {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 6px;
        }

        .participants-section {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }

        .participants-title {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .participants-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-height: 120px;
            overflow-y: auto;
        }

        .participant {
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .participant-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .info-message {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #0c4a6e;
        }

        .info-message.error {
            background: #fee2e2;
            border-left-color: #dc2626;
            color: #991b1b;
        }

        .info-message.warning {
            background: #fed7aa;
            border-left-color: #ea580c;
            color: #9a3412;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        @media (max-width: 500px) {
            .dashboard {
                padding: 16px;
            }
            .talk-button {
                width: 140px;
                height: 140px;
            }
            .mic-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>📻 WALKIE-TALKIE PRO</h1>
    <div class="subtitle">Stable connection · Real-time voice</div>

    <div class="info-message" id="infoMessage">
        💡 Tip: Enter a room name and click "Join Room" to start
    </div>

    <div class="room-section">
        <div class="input-group">
            <label>🔐 ROOM ID</label>
            <div class="room-input-wrapper">
                <input type="text" id="roomIdInput" placeholder="Enter room name" value="lounge">
                <button id="joinBtn" class="btn-primary">Join Room</button>
            </div>
        </div>
        <div class="button-group">
            <button id="leaveBtn" class="btn-danger">Leave Room</button>
        </div>
    </div>

    <div class="status-card">
        <div class="status-badge">
            <span class="led disconnected" id="statusLed"></span>
            <span class="status-text" id="statusText">Disconnected</span>
        </div>
        <div class="room-badge" id="roomBadge">No room</div>
        <div class="participant-count" id="participantCount">👥 0</div>
    </div>

    <div class="voice-visualizer" id="voiceVisualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
    </div>

    <div class="talk-container">
        <div id="talkButton" class="talk-button disabled">
            <div class="mic-icon">🎤</div>
            <div class="talk-label">JOIN A ROOM</div>
            <div class="talk-status">First join a room</div>
        </div>
    </div>

    <div class="participants-section">
        <div class="participants-title">👥 PARTICIPANTS</div>
        <div class="participants-list" id="participantsList">
            <div class="participant">You (not joined)</div>
        </div>
    </div>

    <footer>
        <div>🎙️ Click the button to start/stop talking</div>
        <div style="margin-top: 4px;">🔒 Stable WebRTC connections with auto-reconnect</div>
    </footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // DOM Elements
    const roomInput = document.getElementById('roomIdInput');
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const talkButton = document.getElementById('talkButton');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const roomBadge = document.getElementById('roomBadge');
    const participantCountSpan = document.getElementById('participantCount');
    const participantsListDiv = document.getElementById('participantsList');
    const visualizerBars = document.querySelectorAll('.visualizer-bar');
    const infoMessage = document.getElementById('infoMessage');

    // Global state
    let localStream = null;
    let peerConnections = new Map();
    let socket = null;
    let currentRoom = null;
    let isTalking = false;
    let myUserId = null;
    let users = new Set();
    let audioElements = new Map();
    let reconnectAttempts = 0;
    let maxReconnectAttempts = 10;
    let heartbeatInterval = null;

    // WebRTC configuration with TURN servers for better connectivity
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            { urls: 'stun:stun.stunprotocol.org:3478' }
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: 'all',
        bundlePolicy: 'max-bundle',
        rtcpMuxPolicy: 'require'
    };

    // Helper functions
    function showMessage(message, type = 'info') {
        infoMessage.innerHTML = type === 'error' ? `⚠️ ${message}` : type === 'warning' ? `⚠️ ${message}` : `💡 ${message}`;
        infoMessage.className = `info-message ${type}`;
        setTimeout(() => {
            if (infoMessage.innerHTML === `💡 ${message}` || infoMessage.innerHTML === `⚠️ ${message}`) {
                infoMessage.innerHTML = '💡 Tip: Enter a room name and click "Join Room" to start';
                infoMessage.className = 'info-message';
            }
        }, 4000);
    }

    function updateStatus(status, text) {
        if (status === 'connected') {
            statusLed.className = 'led connected';
            statusText.textContent = text || 'Connected';
        } else if (status === 'connecting') {
            statusLed.className = 'led connecting';
            statusText.textContent = text || 'Connecting...';
        } else {
            statusLed.className = 'led disconnected';
            statusText.textContent = text || 'Disconnected';
        }
    }

    // Microphone initialization
    async function initMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 48000
                } 
            });
            localStream = stream;
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            console.log('✅ Microphone ready');
            showMessage('Microphone ready! Join a room to start talking.');
            return true;
        } catch (err) {
            console.error('Microphone error:', err);
            showMessage('Please allow microphone access to use the app', 'error');
            return false;
        }
    }

    // Create peer connection
    async function createPeerConnection(peerId) {
        const pc = new RTCPeerConnection(configuration);
        
        if (localStream) {
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
        }
        
        pc.onicecandidate = (event) => {
            if (event.candidate && socket && socket.connected) {
                socket.emit('ice-candidate', {
                    candidate: event.candidate,
                    to: peerId
                });
            }
        };
        
        pc.ontrack = (event) => {
            console.log(`📡 Received audio from ${peerId}`);
            
            if (audioElements.has(peerId)) {
                const oldAudio = audioElements.get(peerId);
                if (oldAudio && oldAudio.parentNode) oldAudio.parentNode.removeChild(oldAudio);
            }
            
            const audioEl = new Audio();
            audioEl.srcObject = event.streams[0];
            audioEl.autoplay = true;
            audioEl.volume = 1.0;
            document.body.appendChild(audioEl);
            audioElements.set(peerId, audioEl);
        };
        
        pc.onconnectionstatechange = () => {
            console.log(`Connection with ${peerId}: ${pc.connectionState}`);
            if (pc.connectionState === 'failed') {
                console.log(`Connection failed with ${peerId}, attempting reconnect...`);
                setTimeout(() => reconnectWithPeer(peerId), 2000);
            }
        };
        
        return pc;
    }
    
    async function reconnectWithPeer(peerId) {
        if (!currentRoom || !users.has(peerId)) return;
        
        console.log(`🔄 Reconnecting with ${peerId}`);
        const pc = await createPeerConnection(peerId);
        peerConnections.set(peerId, pc);
        
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        if (socket && socket.connected) {
            socket.emit('offer', { offer: pc.localDescription, to: peerId });
        }
    }
    
    function closePeerConnection(peerId) {
        if (peerConnections.has(peerId)) {
            peerConnections.get(peerId).close();
            peerConnections.delete(peerId);
        }
        if (audioElements.has(peerId)) {
            const audio = audioElements.get(peerId);
            if (audio && audio.parentNode) audio.parentNode.removeChild(audio);
            audioElements.delete(peerId);
        }
        users.delete(peerId);
        updateParticipantsUI();
    }

    // Voice visualizer
    function startVisualizer() {
        if (!localStream) return;
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(localStream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        function update() {
            if (!isTalking) {
                visualizerBars.forEach(bar => bar.style.height = '20px');
                requestAnimationFrame(update);
                return;
            }
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 20; i++) sum += dataArray[i];
            let avg = sum / 20;
            let level = Math.min(1, avg / 150);
            
            visualizerBars.forEach((bar, idx) => {
                let height = 20 + (level * 50 * (idx / visualizerBars.length));
                bar.style.height = `${Math.min(60, Math.max(20, height))}px`;
            });
            
            requestAnimationFrame(update);
        }
        update();
    }

    // Toggle talking
    function toggleTalking() {
        if (!currentRoom || !localStream) {
            showMessage('Please join a room first', 'warning');
            return;
        }
        
        if (users.size === 0 && peerConnections.size === 0) {
            showMessage('No one else is in the room. Wait for others to join.', 'warning');
            return;
        }
        
        isTalking = !isTalking;
        
        if (isTalking) {
            localStream.getAudioTracks().forEach(track => track.enabled = true);
            talkButton.classList.add('talking');
            talkButton.querySelector('.talk-label').textContent = '🔴 TALKING';
            talkButton.querySelector('.talk-status').textContent = 'Click to stop';
            startVisualizer();
            showMessage('You are now talking! Everyone can hear you.');
        } else {
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            talkButton.classList.remove('talking');
            talkButton.querySelector('.talk-label').textContent = 'TAP TO TALK';
            talkButton.querySelector('.talk-status').textContent = 'Click to speak';
            showMessage('You stopped talking.');
        }
    }

    // Update UI
    function updateParticipantsUI() {
        const count = users.size;
        participantCountSpan.textContent = `👥 ${count + 1}`;
        
        if (!currentRoom) {
            participantsListDiv.innerHTML = '<div class="participant">You (not joined)</div>';
            return;
        }
        
        let html = '<div class="participant">👤 You</div>';
        for (let userId of users) {
            const shortId = userId.substring(0, 8);
            html += `
                <div class="participant">
                    <span class="participant-dot"></span>
                    ${shortId}
                </div>
            `;
        }
        
        if (users.size === 0) {
            html += '<div style="color: #9ca3af; font-size: 12px; padding: 8px;">Waiting for others to join...</div>';
        }
        
        participantsListDiv.innerHTML = html;
    }

    // Socket setup with reconnection
    function setupSocket() {
        const serverUrl = window.location.origin;
        
        socket = io(serverUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: maxReconnectAttempts,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            timeout: 20000
        });
        
        socket.on('connect', () => {
            console.log('✅ Connected to server');
            myUserId = socket.id;
            updateStatus('connected', 'Connected');
            reconnectAttempts = 0;
            showMessage('Connected to server! Join a room to start.');
            talkButton.classList.remove('disabled');
            talkButton.querySelector('.talk-label').textContent = 'TAP TO TALK';
            talkButton.querySelector('.talk-status').textContent = 'Click to speak';
        });
        
        socket.on('connection-confirmed', ({ socketId }) => {
            console.log(`Connection confirmed: ${socketId}`);
            myUserId = socketId;
        });
        
        socket.on('disconnect', (reason) => {
            console.log(`Disconnected: ${reason}`);
            updateStatus('connecting', 'Reconnecting...');
            showMessage('Connection lost. Reconnecting...', 'warning');
            talkButton.classList.add('disabled');
            talkButton.querySelector('.talk-label').textContent = 'RECONNECTING';
        });
        
        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            reconnectAttempts++;
            if (reconnectAttempts >= maxReconnectAttempts) {
                showMessage('Failed to connect. Please refresh the page.', 'error');
            }
        });
        
        // Room events
        socket.on('existing-users', async ({ users: existingUsers }) => {
            console.log('Existing users:', existingUsers);
            
            for (let userId of existingUsers) {
                if (userId !== myUserId) {
                    users.add(userId);
                    const pc = await createPeerConnection(userId);
                    peerConnections.set(userId, pc);
                    
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    socket.emit('offer', { offer: pc.localDescription, to: userId });
                }
            }
            
            updateParticipantsUI();
            if (existingUsers.length > 0) {
                showMessage(`${existingUsers.length} other user(s) in the room!`);
            }
        });
        
        socket.on('user-joined', async ({ userId }) => {
            if (userId === myUserId) return;
            
            console.log(`User joined: ${userId}`);
            users.add(userId);
            
            const pc = await createPeerConnection(userId);
            peerConnections.set(userId, pc);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', { offer: pc.localDescription, to: userId });
            
            updateParticipantsUI();
            showMessage(`New user joined! Total: ${users.size + 1} participants`);
        });
        
        socket.on('user-left', ({ userId }) => {
            console.log(`User left: ${userId}`);
            closePeerConnection(userId);
            updateParticipantsUI();
            showMessage(`A user left. ${users.size + 1} participants remaining.`);
        });
        
        socket.on('offer', async ({ offer, from }) => {
            if (from === myUserId) return;
            
            let pc = peerConnections.get(from);
            if (!pc) {
                pc = await createPeerConnection(from);
                peerConnections.set(from, pc);
                users.add(from);
                updateParticipantsUI();
            }
            
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', { answer: pc.localDescription, to: from });
        });
        
        socket.on('answer', async ({ answer, from }) => {
            const pc = peerConnections.get(from);
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });
        
        socket.on('ice-candidate', async ({ candidate, from }) => {
            const pc = peerConnections.get(from);
            if (pc && candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (err) {
                    console.error('ICE candidate error:', err);
                }
            }
        });
        
        socket.on('room-joined', ({ room, participantCount }) => {
            console.log(`Joined room: ${room} with ${participantCount} participants`);
        });
    }

    // Room management
    async function joinRoom() {
        const roomId = roomInput.value.trim();
        if (!roomId) {
            showMessage('Please enter a room ID', 'error');
            return;
        }
        
        if (!localStream) {
            const success = await initMicrophone();
            if (!success) return;
        }
        
        if (!socket) {
            setupSocket();
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
        
        if (currentRoom) {
            leaveRoom();
            await new Promise(resolve => setTimeout(resolve, 500));
        }
        
        currentRoom = roomId;
        socket.emit('join-room', { room: currentRoom });
        
        roomBadge.textContent = `Room: ${currentRoom}`;
        updateStatus('connected', 'Connected');
        
        if (isTalking) {
            isTalking = false;
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            talkButton.classList.remove('talking');
            talkButton.querySelector('.talk-label').textContent = 'TAP TO TALK';
        }
        
        talkButton.classList.remove('disabled');
        showMessage(`✅ Joined room: ${currentRoom}`);
        console.log(`Joined room: ${currentRoom}`);
    }
    
    function leaveRoom() {
        if (!currentRoom || !socket) return;
        
        for (let [peerId, pc] of peerConnections) {
            pc.close();
            if (audioElements.has(peerId)) {
                const audio = audioElements.get(peerId);
                if (audio && audio.parentNode) audio.parentNode.removeChild(audio);
            }
        }
        peerConnections.clear();
        audioElements.clear();
        users.clear();
        
        socket.emit('leave-room', { room: currentRoom });
        
        currentRoom = null;
        roomBadge.textContent = 'No room';
        updateStatus('disconnected', 'Disconnected');
        updateParticipantsUI();
        
        if (localStream) {
            localStream.getAudioTracks().forEach(track => track.enabled = false);
        }
        if (isTalking) {
            isTalking = false;
            talkButton.classList.remove('talking');
            talkButton.querySelector('.talk-label').textContent = 'TAP TO TALK';
        }
        
        talkButton.classList.add('disabled');
        talkButton.querySelector('.talk-label').textContent = 'JOIN A ROOM';
        talkButton.querySelector('.talk-status').textContent = 'First join a room';
        
        showMessage('Left the room.');
    }

    // Event listeners
    joinBtn.addEventListener('click', joinRoom);
    leaveBtn.addEventListener('click', leaveRoom);
    talkButton.addEventListener('click', toggleTalking);
    
    // Initialize on load
    window.addEventListener('load', async () => {
        console.log('Walkie-Talkie app loading...');
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            await initMicrophone();
        } catch (err) {
            console.log('Microphone not granted on load');
        }
        setupSocket();
    });
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (socket) socket.disconnect();
    });
</script>
</body>
</html>
