<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProTalk - Fast Walkie-Talkie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Phone Container */
        .phone-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background: #0a0a0a;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 768px) {
            .phone-container {
                height: 800px;
                border-radius: 40px;
                margin: 20px auto;
            }
        }

        /* Status Bar */
        .status-bar {
            background: #000;
            padding: 12px 20px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        /* Main Content */
        .main-content {
            height: calc(100% - 50px);
            overflow-y: auto;
            padding: 20px;
        }

        /* Profile Section */
        .profile-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #667eea;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            font-family: monospace;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 30px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 26px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Contact List */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .contact-item:hover {
            background: #2a2a2a;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .contact-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-dot.offline {
            background: #6b7280;
        }

        .call-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .call-button:active {
            transform: scale(0.95);
        }

        .add-contact {
            background: #2a2a2a;
            border: 2px dashed #667eea;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            color: #667eea;
            cursor: pointer;
            margin-top: 12px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 350px;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Call Notification */
        .call-notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .call-notification.active {
            transform: translateY(0);
        }

        .call-notification h4 {
            color: white;
            margin-bottom: 8px;
        }

        .call-notification p {
            color: #999;
            margin-bottom: 16px;
        }

        .call-actions {
            display: flex;
            gap: 12px;
        }

        .accept-call, .reject-call {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .accept-call {
            background: #4ade80;
            color: white;
        }

        .reject-call {
            background: #ef4444;
            color: white;
        }

        /* Call Screen */
        .call-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1002;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .call-screen.active {
            display: flex;
        }

        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 24px;
        }

        .caller-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .call-status {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 48px;
        }

        /* TALK BUTTON - Toggle to Talk */
        .talk-button {
            background: white;
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .talk-button.talking {
            background: #ef4444;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(239,68,68,0.5);
        }

        .end-call {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .end-call:active {
            transform: scale(0.95);
        }

        .voice-visualizer {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            height: 60px;
            align-items: center;
            justify-content: center;
        }

        .visualizer-bar {
            width: 8px;
            height: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
            transition: height 0.05s ease;
        }

        .history-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .history-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            color: white;
            font-weight: 600;
        }

        .history-time {
            font-size: 11px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="status-bar">
        <span>📱 ProTalk</span>
        <span id="time">--:--</span>
    </div>

    <div class="main-content">
        <!-- Profile Section -->
        <div class="profile-section" id="profileSection">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <div class="profile-name" id="profileName">Set up profile</div>
            <div class="profile-id" id="profileId">Not registered</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="contacts">📞 Contacts</div>
            <div class="tab" data-tab="history">🕒 History</div>
        </div>

        <!-- Contacts Tab -->
        <div id="contactsTab">
            <div class="contact-list" id="contactList"></div>
            <div class="add-contact" onclick="showAddContactModal()">
                + Add New Contact
            </div>
        </div>

        <!-- History Tab -->
        <div id="historyTab" style="display: none;">
            <div id="callHistory"></div>
        </div>
    </div>
</div>

<!-- Setup Profile Modal -->
<div class="modal" id="setupModal">
    <div class="modal-content">
        <h3>Set up your profile</h3>
        <input type="text" id="userName" placeholder="Your name">
        <input type="text" id="userId" placeholder="User ID (unique)">
        <div class="modal-buttons">
            <button onclick="saveProfile()" style="background: #667eea; color: white;">Save</button>
        </div>
    </div>
</div>

<!-- Add Contact Modal -->
<div class="modal" id="addContactModal">
    <div class="modal-content">
        <h3>Add Contact</h3>
        <input type="text" id="contactUserId" placeholder="User ID">
        <input type="text" id="contactName" placeholder="Contact name">
        <div class="modal-buttons">
            <button onclick="addContact()" style="background: #667eea; color: white;">Add</button>
            <button onclick="closeAddContactModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Call Notification -->
<div class="call-notification" id="callNotification">
    <h4>📞 Incoming Call</h4>
    <p id="callerName">Caller</p>
    <div class="call-actions">
        <button class="accept-call" onclick="acceptCall()">Accept</button>
        <button class="reject-call" onclick="rejectCall()">Reject</button>
    </div>
</div>

<!-- Call Screen -->
<div class="call-screen" id="callScreen">
    <div class="call-avatar" id="callAvatar">👤</div>
    <div class="caller-name" id="callScreenName">Calling...</div>
    <div class="call-status" id="callStatus">Connecting...</div>
    
    <div class="voice-visualizer" id="voiceVisualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
    </div>
    
    <!-- TALK BUTTON - Click to Talk, Click again to Stop -->
    <button class="talk-button" id="talkButton" onclick="toggleTalk()">
        🎤 TALK
    </button>
    
    <button class="end-call" onclick="endCall()">End Call</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ==================== Global State ====================
    let currentUser = null;
    let socket = null;
    let contacts = [];
    let callHistory = [];
    let currentCall = null;
    let pendingCall = null;
    let peerConnection = null;
    let localStream = null;
    let currentRoom = null;
    let isTalking = false;
    let remoteAudio = null;
    let visualizerInterval = null;

    // WebRTC Configuration
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ],
        iceCandidatePoolSize: 5
    };

    // ==================== Initialize ====================
    async function init() {
        const savedUser = localStorage.getItem('protalk_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateProfileUI();
            connectSocket();
        } else {
            showSetupModal();
        }
        
        // Request microphone immediately for faster connection
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            console.log('✅ Microphone ready');
        } catch (err) {
            console.error('Microphone error:', err);
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.getElementById('contactsTab').style.display = tabName === 'contacts' ? 'block' : 'none';
                document.getElementById('historyTab').style.display = tabName === 'history' ? 'block' : 'none';
                
                if (tabName === 'history') loadCallHistory();
            });
        });
        
        updateTime();
        setInterval(updateTime, 1000);
    }
    
    function updateTime() {
        const now = new Date();
        document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // ==================== Profile Management ====================
    function showSetupModal() {
        document.getElementById('setupModal').classList.add('active');
        document.getElementById('userId').value = 'user_' + Math.floor(Math.random() * 10000);
    }
    
    function saveProfile() {
        const name = document.getElementById('userName').value.trim();
        let userId = document.getElementById('userId').value.trim();
        
        if (!name) {
            alert('Please enter your name');
            return;
        }
        
        if (!userId) {
            userId = 'user_' + Date.now();
        }
        
        currentUser = {
            userId: userId,
            name: name,
            avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=667eea&color=fff`
        };
        
        localStorage.setItem('protalk_user', JSON.stringify(currentUser));
        updateProfileUI();
        document.getElementById('setupModal').classList.remove('active');
        
        connectSocket();
        loadContacts();
    }
    
    function updateProfileUI() {
        if (currentUser) {
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileId').textContent = currentUser.userId;
            document.getElementById('profileAvatar').innerHTML = currentUser.name.charAt(0).toUpperCase();
        }
    }
    
    // ==================== Socket Connection ====================
    function connectSocket() {
        socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        
        socket.on('connect', () => {
            console.log('✅ Connected instantly');
            if (currentUser) {
                socket.emit('register-user', {
                    userId: currentUser.userId,
                    name: currentUser.name,
                    avatar: currentUser.avatar
                });
            }
        });
        
        socket.on('registration-success', () => {
            console.log('✅ Ready to make calls');
        });
        
        socket.on('user-status-changed', ({ userId, status }) => {
            updateContactStatus(userId, status);
        });
        
        // Incoming call - INSTANT
        socket.on('incoming-call', ({ callId, from, fromName, roomId }) => {
            pendingCall = { callId, from, fromName, roomId };
            document.getElementById('callerName').textContent = `${fromName} is calling...`;
            document.getElementById('callNotification').classList.add('active');
        });
        
        socket.on('call-accepted', ({ callId, roomId, toUserId, toName }) => {
            document.getElementById('callStatus').textContent = 'Connected';
            document.getElementById('callStatus').style.color = '#4ade80';
            currentRoom = roomId;
            startCall(roomId, toUserId);
        });
        
        socket.on('call-rejected', () => {
            alert('Call rejected');
            document.getElementById('callScreen').classList.remove('active');
            currentCall = null;
        });
        
        socket.on('call-ended', () => {
            endCall();
        });
        
        // WebRTC signaling
        socket.on('offer', async ({ offer, from }) => {
            if (!peerConnection) {
                peerConnection = createPeerConnection(from);
            }
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { answer: peerConnection.localDescription, to: from });
        });
        
        socket.on('answer', async ({ answer, from }) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });
        
        socket.on('ice-candidate', async ({ candidate, from }) => {
            if (peerConnection && candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            }
        });
    }
    
    // ==================== WebRTC ====================
    function createPeerConnection(peerId) {
        const pc = new RTCPeerConnection(configuration);
        
        if (localStream) {
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
        }
        
        pc.onicecandidate = (event) => {
            if (event.candidate && socket) {
                socket.emit('ice-candidate', { candidate: event.candidate, to: peerId });
            }
        };
        
        pc.ontrack = (event) => {
            if (!remoteAudio) {
                remoteAudio = new Audio();
                remoteAudio.autoplay = true;
                document.body.appendChild(remoteAudio);
            }
            remoteAudio.srcObject = event.streams[0];
        };
        
        return pc;
    }
    
    async function startCall(roomId, toUserId) {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getAudioTracks().forEach(track => track.enabled = false);
            } catch (err) {
                return;
            }
        }
        
        socket.emit('join-room', { room: roomId, userId: currentUser.userId });
        
        if (!peerConnection) {
            peerConnection = createPeerConnection(toUserId);
        }
        
        if (peerConnection.signalingState === 'stable') {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', { offer: peerConnection.localDescription, to: toUserId });
        }
        
        startVisualizer();
    }
    
    // ==================== Voice Visualizer ====================
    function startVisualizer() {
        if (!localStream) return;
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(localStream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 128;
        source.connect(analyser);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        function update() {
            if (!isTalking) {
                document.querySelectorAll('.visualizer-bar').forEach(bar => {
                    bar.style.height = '20px';
                    bar.style.opacity = '0.3';
                });
                requestAnimationFrame(update);
                return;
            }
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 10; i++) sum += dataArray[i];
            let level = Math.min(1, sum / 300);
            
            document.querySelectorAll('.visualizer-bar').forEach((bar, idx) => {
                let height = 20 + (level * 60 * (idx / 6));
                bar.style.height = `${Math.min(70, Math.max(20, height))}px`;
                bar.style.opacity = level > 0.1 ? '1' : '0.5';
            });
            
            requestAnimationFrame(update);
        }
        update();
    }
    
    // ==================== TALK BUTTON - TOGGLE ====================
    function toggleTalk() {
        if (!currentCall || !localStream) {
            alert('No active call');
            return;
        }
        
        isTalking = !isTalking;
        
        if (isTalking) {
            // Start talking
            localStream.getAudioTracks().forEach(track => track.enabled = true);
            document.getElementById('talkButton').classList.add('talking');
            document.getElementById('talkButton').innerHTML = '🔴 TALKING...';
            console.log('🎤 Started talking');
        } else {
            // Stop talking
            localStream.getAudioTracks().forEach(track => track.enabled = false);
            document.getElementById('talkButton').classList.remove('talking');
            document.getElementById('talkButton').innerHTML = '🎤 TALK';
            console.log('🔇 Stopped talking');
        }
    }
    
    // ==================== Call Actions ====================
    function makeCall(userId, userName) {
        if (!currentUser) {
            alert('Please set up your profile first');
            return;
        }
        
        const roomId = `call_${Date.now()}`;
        currentCall = { to: userId, name: userName, roomId };
        
        document.getElementById('callScreenName').textContent = userName;
        document.getElementById('callStatus').textContent = 'Ringing...';
        document.getElementById('callScreen').classList.add('active');
        document.getElementById('talkButton').classList.remove('talking');
        document.getElementById('talkButton').innerHTML = '🎤 TALK';
        isTalking = false;
        
        socket.emit('initiate-call', {
            fromUserId: currentUser.userId,
            toUserId: userId,
            fromName: currentUser.name,
            roomId: roomId
        });
        
        addToHistory(userName, 'outgoing', 'dialed');
    }
    
    function acceptCall() {
        if (pendingCall) {
            document.getElementById('callNotification').classList.remove('active');
            document.getElementById('callScreenName').textContent = pendingCall.fromName;
            document.getElementById('callStatus').textContent = 'Connecting...';
            document.getElementById('callScreen').classList.add('active');
            document.getElementById('talkButton').classList.remove('talking');
            document.getElementById('talkButton').innerHTML = '🎤 TALK';
            isTalking = false;
            
            socket.emit('accept-call', {
                callId: pendingCall.callId,
                roomId: pendingCall.roomId,
                fromUserId: pendingCall.from,
                toUserId: currentUser.userId
            });
            
            currentCall = pendingCall;
            startCall(pendingCall.roomId, pendingCall.from);
            pendingCall = null;
            
            addToHistory(currentCall.fromName, 'incoming', 'answered');
        }
    }
    
    function rejectCall() {
        if (pendingCall) {
            socket.emit('reject-call', {
                callId: pendingCall.callId,
                fromUserId: pendingCall.from,
                toUserId: currentUser.userId
            });
            document.getElementById('callNotification').classList.remove('active');
            pendingCall = null;
        }
    }
    
    function endCall() {
        if (currentCall) {
            socket.emit('end-call', {
                roomId: currentCall.roomId,
                fromUserId: currentUser.userId,
                toUserId: currentCall.to
            });
        }
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        if (remoteAudio) {
            remoteAudio.srcObject = null;
            remoteAudio = null;
        }
        
        if (localStream) {
            localStream.getAudioTracks().forEach(track => track.enabled = false);
        }
        
        document.getElementById('callScreen').classList.remove('active');
        document.getElementById('callNotification').classList.remove('active');
        currentCall = null;
        currentRoom = null;
        isTalking = false;
    }
    
    // ==================== Contacts ====================
    async function loadContacts() {
        if (!currentUser) return;
        
        try {
            const response = await fetch(`/api/contacts/${currentUser.userId}`);
            const data = await response.json();
            contacts = data.contacts || [];
            renderContacts();
        } catch (err) {
            console.error('Error loading contacts:', err);
        }
    }
    
    function renderContacts() {
        const container = document.getElementById('contactList');
        if (contacts.length === 0) {
            container.innerHTML = '<div style="color: #666; text-align: center; padding: 40px;">No contacts yet. Add your first contact!</div>';
            return;
        }
        
        container.innerHTML = contacts.map(contact => `
            <div class="contact-item">
                <div class="contact-avatar">${contact.name.charAt(0)}</div>
                <div class="contact-info">
                    <div class="contact-name">${contact.name}</div>
                    <div class="contact-status">
                        <span class="status-dot" id="status-${contact.userId}"></span>
                        <span id="status-text-${contact.userId}">Checking...</span>
                    </div>
                </div>
                <button class="call-button" onclick="makeCall('${contact.userId}', '${contact.name}')">Call</button>
            </div>
        `).join('');
        
        // Check status for each contact
        contacts.forEach(contact => {
            updateContactStatus(contact.userId, 'offline');
        });
    }
    
    function updateContactStatus(userId, status) {
        const dot = document.getElementById(`status-${userId}`);
        const text = document.getElementById(`status-text-${userId}`);
        if (dot) {
            dot.className = `status-dot ${status === 'online' ? '' : 'offline'}`;
            if (text) text.textContent = status === 'online' ? 'Online' : 'Offline';
        }
    }
    
    async function addContact() {
        const contactUserId = document.getElementById('contactUserId').value.trim();
        const contactName = document.getElementById('contactName').value.trim();
        
        if (!contactUserId) {
            alert('Please enter a User ID');
            return;
        }
        
        try {
            const response = await fetch('/api/contacts/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.userId,
                    contactId: contactUserId,
                    contactName: contactName || contactUserId
                })
            });
            
            const data = await response.json();
            if (data.success) {
                contacts = data.contacts;
                renderContacts();
                closeAddContactModal();
            } else {
                alert(data.message || 'Failed to add contact');
            }
        } catch (err) {
            console.error('Error adding contact:', err);
            alert('Failed to add contact');
        }
    }
    
    function showAddContactModal() {
        document.getElementById('addContactModal').classList.add('active');
        document.getElementById('contactUserId').value = '';
        document.getElementById('contactName').value = '';
    }
    
    function closeAddContactModal() {
        document.getElementById('addContactModal').classList.remove('active');
    }
    
    // ==================== Call History ====================
    function addToHistory(name, type, status) {
        callHistory.unshift({
            name,
            type,
            status,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        
        if (callHistory.length > 50) callHistory.pop();
        localStorage.setItem('protalk_history', JSON.stringify(callHistory));
        loadCallHistory();
    }
    
    function loadCallHistory() {
        const saved = localStorage.getItem('protalk_history');
        if (saved) callHistory = JSON.parse(saved);
        
        const container = document.getElementById('callHistory');
        if (callHistory.length === 0) {
            container.innerHTML = '<div style="color: #666; text-align: center; padding: 40px;">No call history</div>';
            return;
        }
        
        container.innerHTML = callHistory.map(call => `
            <div class="history-item">
                <div class="history-avatar">${call.name.charAt(0)}</div>
                <div class="history-info">
                    <div class="history-name">${call.name}</div>
                    <div class="history-time">${call.type === 'outgoing' ? '📞 Outgoing' : '📱 Incoming'} • ${call.time}</div>
                </div>
                <div style="font-size: 12px; color: ${call.status === 'missed' ? '#ef4444' : '#4ade80'}">
                    ${call.status === 'missed' ? 'Missed' : call.status === 'dialed' ? 'Dialed' : 'Connected'}
                </div>
            </div>
        `).join('');
    }
    
    // Start
    init();
</script>
</body>
</html>
